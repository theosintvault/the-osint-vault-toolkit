[tool.poetry]
name = "vaulttracer"
version = "1.0.0"
description = "High-velocity OSINT pivot engine for elite target tracing."
authors = ["VaultTracer Dev Team"]
packages = [{include = "theosintvault"}]

[tool.poetry.dependencies]
python = "^3.8"
requests = "^2.31.0"
colorama = "^0.4.6"

[tool.poetry.scripts]
vaulttracer = "theosintvault.cli:main"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
