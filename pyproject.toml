[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "theosintvault"
version = "0.1.0"
description = "Open-source investigative utilities inspired by The OSINT Vault."
readme = "README.md"
requires-python = ">=3.8"
dependencies = []

[project.scripts]
theosintvault = "theosintvault.cli:main"

[tool.setuptools]
packages = ["theosintvault"]
